name: OpenSpec Change Notification

on:
  push:
    branches: [main]
    paths:
      - 'changes/**'
      - 'specs/**'
  workflow_dispatch:
    inputs:
      files:
        description: "Space-separated list of files to simulate as changed (e.g. specs/full-stack-architecture/spec.md)"
        required: true
        default: "specs/full-stack-architecture/spec.md"

permissions:
  contents: read
  models: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Get changed files
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "${{ github.event.inputs.files }}" | tr ' ' '\n' > /tmp/changed_files.txt
          else
            git diff --name-only HEAD~1 HEAD > /tmp/changed_files.txt
          fi

      - name: Send OpenSpec notification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_OPENSPEC_WEBHOOK }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          GH_REF: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
        run: python3 .github/scripts/openspec_notify.py /tmp/changed_files.txt
